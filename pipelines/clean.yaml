pipeline:
  name: Clean all
  with:
    build.output.directory: output
    resources.configuration.directory: integration_test_suite/integration_tests/src/test/resources/configuration
  jobs:
    - name: Clean all
      steps:
        - name: Clean build output directory
          run: rm -Rf ${{ INPUT_BUILD_OUTPUT_DIRECTORY }}
        - name: Clean resources configuration directory
          run: rm -Rf ${{ INPUT_RESOURCES_CONFIGURATION_DIRECTORY }}
