pipeline:
  name: Build & Regression Test
  with:
    test.pipelines.directory: pipelines/test/regression
  jobs:
    - name: Build & Regression Test - Java 8
      steps:
        - name: Build & Regression Test Java 8
          run: ./pipeliner --suppress-timestamps ${{ INPUT_TEST_PIPELINES_DIRECTORY }}/java8.yaml
        - name: Build & Regression Test Java 11
          run: ./pipeliner --suppress-timestamps ${{ INPUT_TEST_PIPELINES_DIRECTORY }}/java11.yaml
        - name: Build & Regression Test - Java 17
          run: ./pipeliner --suppress-timestamps ${{ INPUT_TEST_PIPELINES_DIRECTORY }}/java17.yaml
        - name: Build & Regression Test - Java 21
          run: ./pipeliner --suppress-timestamps ${{ INPUT_TEST_PIPELINES_DIRECTORY }}/java21.yaml
