pipeline:
  name: Build & Regression Test - All
  with:
    pipelines.test.regression.directory: pipelines/test/regression
  jobs:
    - name: Build & Regression Test - All
      steps:
        - name: Build & Regression Test - Java 8
          run: ./pipeliner --suppress-timestamps ${{ INPUT_PIPELINES_TEST_REGRESSION_DIRECTORY }}/java8.yaml
        - name: Build & Regression Test - Java 11
          run: ./pipeliner --suppress-timestamps ${{ INPUT_PIPELINES_TEST_REGRESSION_DIRECTORY }}/java11.yaml
        - name: Build & Regression Test - Java 17
          run: ./pipeliner --suppress-timestamps ${{ INPUT_PIPELINES_TEST_REGRESSION_DIRECTORY }}/java17.yaml
        - name: Build & Regression Test - Java 21
          run: ./pipeliner --suppress-timestamps ${{ INPUT_PIPELINES_TEST_REGRESSION_DIRECTORY }}/java21.yaml
