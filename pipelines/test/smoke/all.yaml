pipeline:
  name: Build & Smoke Test - All
  with:
    pipelines.test.smoke.directory: pipelines/test/smoke
  jobs:
    - name: Build & Smoke Test - All
      steps:
        - name: Build & Smoke Test - Java 8
          run: ./pipeliner ${{ INPUT_pipelines.test.smoke.directory }}/java8.yaml
        - name: Build & Smoke Test - Java 11
          run: ./pipeliner ${{ INPUT_pipelines.test.smoke.directory }}/java11.yaml
        - name: Build & Smoke Test - Java 17
          run: ./pipeliner ${{ INPUT_pipelines.test.smoke.directory }}/java17.yaml
        - name: Build & Smoke Test - Java 21
          run: ./pipeliner ${{ INPUT_pipelines.test.smoke.directory }}/java21.yaml
