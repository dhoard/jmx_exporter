pipeline:
  name: Build & Smoke Test - All
  with:
    pipelines.test.smoke.directory: pipelines/test/smoke
  jobs:
    - name: Build & Smoke Test - All
      steps:
        - name: Build & Smoke Test - Java 8
          run: ./pipeliner  ${{ INPUT_PIPELINES_TEST_SMOKE_DIRECTORY }}/java8.yaml
        - name: Build & Smoke Test - Java 11
          run: ./pipeliner  ${{ INPUT_PIPELINES_TEST_SMOKE_DIRECTORY }}/java11.yaml
        - name: Build & Smoke Test - Java 17
          run: ./pipeliner  ${{ INPUT_PIPELINES_TEST_SMOKE_DIRECTORY }}/java17.yaml
        - name: Build & Smoke Test - Java 21
          run: ./pipeliner  ${{ INPUT_PIPELINES_TEST_SMOKE_DIRECTORY }}/java21.yaml
