pipeline:
  name: Build & Smoke Test - Java 11
  with:
    integration.tests.configuration.directory: integration_test_suite/integration_tests/configuration/test/smoke
    integration.tests.resources.configuration.directory: integration_test_suite/integration_tests/src/test/resources/configuration
    java.docker.images: java-docker-images-java11.txt
  jobs:
    - name: Build & Smoke Test - Java 11
      steps:
        - name: Build
          run: ./mvnw -P java11 clean package
        - name: Clean Integration Tests Resources Directory
          run: rm -Rf ${{ INPUT_INTEGRATION_TESTS_RESOURCES_CONFIGURATION_DIRECTORY }}
        - name: Create Integration Tests Resources Directory
          run: mkdir ${{ INPUT_INTEGRATION_TESTS_RESOURCES_CONFIGURATION_DIRECTORY }}
        - name: Patch Integration Tests 1
          run: cp jmx_prometheus_javaagent/target/jmx_prometheus_javaagent*.jar ${{ INPUT_INTEGRATION_TESTS_RESOURCES_CONFIGURATION_DIRECTORY }}/.
        - name: Patch Integration Tests 2
          run: cp jmx_prometheus_httpserver/target/jmx_prometheus_httpserver*.jar ${{ INPUT_INTEGRATION_TESTS_RESOURCES_CONFIGURATION_DIRECTORY }}/.
        - name: Remove Irrelevant Javadoc Jars
          working-directory: ${{ INPUT_INTEGRATION_TESTS_RESOURCES_CONFIGURATION_DIRECTORY }}
          run: rm -Rf *javadoc.jar
        - name: Remove Irrelevant Source Jars
          working-directory: ${{ INPUT_INTEGRATION_TESTS_RESOURCES_CONFIGURATION_DIRECTORY }}
          run: rm -Rf *sources.jar
        - name: Rename Jar 2
          working-directory: ${{ INPUT_INTEGRATION_TESTS_RESOURCES_CONFIGURATION_DIRECTORY }}
          run: mv jmx_prometheus_javaagent*.jar jmx_prometheus_javaagent.jar
        - name: Rename Jar 2
          working-directory: ${{ INPUT_INTEGRATION_TESTS_RESOURCES_CONFIGURATION_DIRECTORY }}
          run: mv jmx_prometheus_httpserver*.jar jmx_prometheus_httpserver.jar
        - name: Build JMX Example Application
          working-directory: integration_test_suite/jmx_example_application
          run: ../../mvnw clean package
        - name: Patch Integration Tests 3
          run: cp integration_test_suite/jmx_example_application/target/jmx_example_application.jar ${{ INPUT_INTEGRATION_TESTS_RESOURCES_CONFIGURATION_DIRECTORY }}/.
        - name: Copy Java Docker Configuration Resources
          run: cp ${{ INPUT_INTEGRATION_TESTS_CONFIGURATION_DIRECTORY }}/${{ INPUT_JAVA_DOCKER_IMAGES }} ${{ INPUT_INTEGRATION_TESTS_RESOURCES_CONFIGURATION_DIRECTORY }}/java-docker-images.txt
        - name: Copy Prometheus Docker Configuration Resources
          run: cp ${{ INPUT_INTEGRATION_TESTS_CONFIGURATION_DIRECTORY }}/prometheus-docker-images.txt ${{ INPUT_INTEGRATION_TESTS_RESOURCES_CONFIGURATION_DIRECTORY }}/prometheus-docker-images.txt
        - name: Build Integration Tests
          working-directory: integration_test_suite/integration_tests
          run: ../../mvnw clean verify