pipeline:
  name: Build - All
  with:
    pipelines.build.directory: pipelines/build
  jobs:
    - name: Build - All
      steps:
        - name: Build - Java 8
          run: ./pipeliner --suppress-timestamps ${{ INPUT_PIPELINES_BUILD_DIRECTORY }}/java8.yaml
        - name: Build - Java 11
          run: ./pipeliner --suppress-timestamps ${{ INPUT_PIPELINES_BUILD_DIRECTORY }}/java11.yaml
        - name: Build - Java 17
          run: ./pipeliner --suppress-timestamps ${{ INPUT_PIPELINES_BUILD_DIRECTORY }}/java17.yaml
        - name: Build - Java 21
          run: ./pipeliner --suppress-timestamps ${{ INPUT_PIPELINES_BUILD_DIRECTORY }}/java21.yaml
