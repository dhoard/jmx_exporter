pipeline:
  name: Build & Package All
  with:
    clean.pipelines.directory: pipelines
    build.pipelines.directory: pipelines/build
  jobs:
    - name: Build & Package All
      steps:
        - name: Clean Output Directory
          run: ./pipeliner --suppress-timestamps ${{ INPUT_CLEAN_PIPELINES_DIRECTORY}}/clean.yaml
        - name: Build & Package - Java 8
          run: ./pipeliner --suppress-timestamps ${{ INPUT_BUILD_PIPELINES_DIRECTORY}}/java8.yaml
        - name: Build & Package - Java 11
          run: ./pipeliner --suppress-timestamps ${{ INPUT_BUILD_PIPELINES_DIRECTORY}}/java11.yaml
        - name: Build & Package - Java 17
          run: ./pipeliner --suppress-timestamps ${{ INPUT_BUILD_PIPELINES_DIRECTORY}}/java17.yaml
        - name: Build & Package - Java 21
          run: ./pipeliner --suppress-timestamps ${{ INPUT_BUILD_PIPELINES_DIRECTORY}}/java21.yaml
