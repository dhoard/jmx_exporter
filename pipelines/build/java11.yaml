pipeline:
  name: Build - Java 11
  jobs:
    - name: Build - Java 11
      steps:
        - name: Prepare Java 11
          run: ./pipeliner pipelines/prepare/java11.yaml
        - name: Build
          run: ./mvnw --batch-mode clean package
        - name: Create output directory
          run: mkdir -p output/java11
        - name: Clean output directory
          run: rm -Rf output/java11/*
        - name: Copy jar
          run: cp collector/target/collector*.jar output/java11/
        - name: Copy jar
          run: cp jmx_prometheus_common/target/jmx_prometheus_common*.jar output/java11/
        - name: Copy jar
          run: cp jmx_prometheus_javaagent/target/jmx_prometheus_javaagent*.jar output/java11/
        - name: Copy jar
          run: cp jmx_prometheus_httpserver/target/jmx_prometheus_httpserver*.jar output/java11/
