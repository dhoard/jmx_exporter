pipeline:
  name: Build - Java 21
  jobs:
    - name: Build - Java 21
      steps:
        - name: Patch parent pom.xml
          run: cp pom-java21.xml pom.xml
        - name: Patch collector pom.xml
          working-directory: collector
          run: cp pom-java21.xml pom.xml
        - name: Patch jmx_prometheus_common pom.xml
          working-directory: jmx_prometheus_common
          run: cp pom-java21.xml pom.xml
        - name: Patch jmx_prometheus_javaagent pom.xml
          working-directory: jmx_prometheus_javaagent
          run: cp pom-java21.xml pom.xml
        - name: Patch jmx_prometheus_httpserver pom.xml
          working-directory: jmx_prometheus_httpserver
          run: cp pom-java21.xml pom.xml
        - name: Build - Java 21
          run: ./mvnw --batch-mode -P java21 clean package
