pipeline:
  name: Build
  properties:
    - name: java.version
      value: java21
    - name: maven.arguments
      value: -P java21
    - name: build.output.directory
      value: output
    - name: java.agent.target.directory
      value: jmx_prometheus_javaagent/target
    - name: httpserver.target.directory
      value: jmx_prometheus_httpserver/target
    - name: example.application.target.directory
      value: integration_test_suite/jmx_example_application/target
    - name: integration.tests.configuration.directory
      value: integration_test_suite/integration_tests/configuration/test/smoke
    - name: resources.configuration.directory
      value: integration_test_suite/integration_tests/src/test/resources/configuration
  jobs:
    - name: Create output directory
      enabled: true
      steps:
        - name: Create output directory
          run: mkdir -p ${{ build.output.directory }}/${{ java.version }}
    - name: Clean output directory
      enabled: true
      steps:
        - name: Clean output directory
          run: rm -Rf ${{ build.output.directory }}/${{ java.version }}/*
    - name: Build
      enabled: true
      steps:
        - name: Build
          run: ./mvnw ${{ maven.arguments }} clean package
    - name: Copy jars
      enabled: true
      steps:
        - name: Copy jar
          run: cp ${{ java.agent.target.directory }}/jmx_prometheus_javaagent*.jar ${{ build.output.directory }}/${{ java.version }}/
        - name: Copy jar
          run: cp ${{ httpserver.target.directory }}/jmx_prometheus_httpserver*.jar ${{ build.output.directory }}/${{ java.version }}/
    - name: Patch integration tests
      enabled: true
      steps:
        - name: Clean resources configuration directory
          run: rm -Rf ${{ resources.configuration.directory }}
        - name: Create resources configuration directory
          run: mkdir -p ${{ resources.configuration.directory }}
        - name: Copy jars
          run: cp ${{ build.output.directory }}/${{ java.version }}/*.jar ${{ resources.configuration.directory }}/
        - name: Delete extraneous jars
          run: rm -Rf ${{ resources.configuration.directory }}/*-javadoc.jar
        - name: Delete extraneous jars
          run: rm -Rf ${{ resources.configuration.directory }}/*-sources.jar
        - name: Rename jar
          run: mv ${{ resources.configuration.directory }}/jmx_prometheus_javaagent*-*.jar ${{ resources.configuration.directory }}/jmx_prometheus_javaagent.jar
        - name: Rename jar
          run: mv ${{ resources.configuration.directory }}/jmx_prometheus_httpserver*-*.jar ${{ resources.configuration.directory }}/jmx_prometheus_httpserver.jar
        - name: Copy example application jar
          run: cp ${{ example.application.target.directory }}/jmx_example_application.jar ${{ resources.configuration.directory }}/
        - name: Copy Java docker images file
          run: cp ${{ integration.tests.configuration.directory }}/java-docker-images-${{ java.version }}.txt ${{ resources.configuration.directory }}/
        - name: Copy Prometheus docker images file
          run: cp ${{ integration.tests.configuration.directory }}/prometheus-docker-images.txt ${{ resources.configuration.directory }}/
        - name: Rename Java docker images file
          run: mv ${{ resources.configuration.directory }}/java-docker-images*-*.txt ${{ resources.configuration.directory }}/java-docker-images.txt
    - name: Run integration tests
      enabled: true
      steps:
        - name: Run integration tests
          working-directory: integration_test_suite
          run: ../mvnw clean verify